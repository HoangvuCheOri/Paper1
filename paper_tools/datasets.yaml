    parameters:
      side_length_m: 2.0
      desired_speed_m_s: 0.10
      corner_speed_m_s: 0.04
      k1: 0.8
      k2: 6.0
      k3: 7.0
      ks1: 0.08
      ks2: 0.10
      phi1: 1.0
      phi2: 1.5

link_runs:
