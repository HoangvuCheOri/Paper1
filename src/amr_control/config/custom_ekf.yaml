custom_ekf_node:
  ros__parameters:
    frequency: 20.0
    sensor_timeout: 0.5

    odom_topic: /odom_raw
    camera_topic: /odom_camera
    imu_topic: /imu/data
    output_topic: /odometry/filtered
    reset_topic: /reset_odom

    odom_frame: odom
    base_link_frame: base_link
    publish_tf: true

    # === SENSOR FUSION FLAGS ===
    # ┌─────────────────────────────────────────────────────────────┐
    # │ Encoder: CHỈ đóng góp v, w (prediction + measurement)     │
    # │ Camera:  Cung cấp x, y, yaw tuyệt đối (absolute update)  │
    # │ IMU:     Cung cấp w (angular velocity measurement)        │
    # └─────────────────────────────────────────────────────────────┘
    use_odom_pose: false          # TẮT: Encoder position xung đột frame với camera. Encoder đã đóng góp qua predict(v,w).
    use_odom_yaw: false           # TẮT: Encoder yaw drift dài hạn → camera yaw thay thế.
    use_odom_w: true              # BẬT: Encoder angular velocity → frame-agnostic, dùng tốt.
    use_camera_pose: true         # BẬT: Camera X, Y tuyệt đối (đã calibrate).
    use_camera_yaw: true          # BẬT: Camera yaw tuyệt đối.
    use_camera_yaw_for_alignment: false
    use_imu_w: false              # CSV hiện tại chỉ kiểm chứng encoder + camera; không để gyro kéo yaw.
    imu_w_sign: 1.0
    odom_w_sign: 1.0

    # === ALIGNMENT ===
    # TẮT vì /odom_camera đã được homography 17 điểm đưa về tọa độ thực tế.
    # EKF chạy trực tiếp trong frame tọa độ camera/map; encoder chỉ cấp v,w.
    align_camera_to_odom: false
    camera_aligned_topic: /odom_camera_aligned

    # Không dùng khi align_camera_to_odom=false. Giữ identity để tránh remap nhầm
    # nếu bật align lại trong lúc debug.
    camera_delta_m00: 1.0
    camera_delta_m01: 0.0
    camera_delta_m10: 0.0
    camera_delta_m11: 1.0
    camera_yaw_sign: 1.0

    # === INITIAL COVARIANCE P0 ===
    # Tăng từ 0.10 lên 1.0 để EKF tin camera nhiều hơn ở giai đoạn đầu,
    # giúp hội tụ nhanh hơn (chỉ sau 2-3 mẫu camera là P giảm xuống ~0.003)
    initial_covariance: 1.0

    # === PROCESS NOISE Q (ADAPTIVE BOOST) ===
    # Mô hình hóa "robot có thể sai bao nhiêu mỗi bước dự đoán"
    # Q nhỏ → tin encoder hơn | Q lớn → tin cảm biến đo hơn
    # Tăng so với trước vì:
    #   - ESP-NOW có jitter → prediction không chính xác
    #   - robot chạy nhanh hơn (max_v=0.18) → cần EKF responsive hơn
    process_noise_x: 0.003        # Từ 0.001 → 0.003
    process_noise_y: 0.003        # Từ 0.001 → 0.003
    process_noise_theta: 0.006    # Từ 0.002 → 0.006
    process_noise_v: 0.08         # Từ 0.06 → 0.08
    process_noise_w: 0.12         # Từ 0.08 → 0.12

    # === MEASUREMENT NOISE R (Encoder / Odom) ===
    odom_x_variance: 0.05         # Không dùng (use_odom_pose=false) nhưng giữ cho tham khảo
    odom_y_variance: 0.05
    odom_yaw_variance: 1.00
    odom_v_variance: 0.02         # Encoder tốc độ thẳng: khá tin
    odom_w_variance: 0.08         # Encoder w là nguồn chính cho prediction.

    # === MEASUREMENT NOISE R (Camera AprilTag) ===
    use_camera_msg_covariance: false   # Dùng R bên dưới làm nguồn tune chính, không bị covariance trong /odom_camera ghi đè
    # Test tĩnh: std_x=0.56cm, std_y=0.19cm, std_yaw=0.039°
    # Dynamic: tăng ~10x để EKF lọc nhiễu motion blur + rung lắc
    camera_x_variance: 0.0036       # std ≈ 6 cm khi robot đang chạy
    camera_y_variance: 0.0036       # std ≈ 6 cm khi robot đang chạy
    camera_yaw_variance: 0.0030     # std ≈ 3 deg

    # === MEASUREMENT NOISE R (IMU) ===
    imu_w_variance: 0.08            # IMU hỗ trợ yaw-rate nhưng không áp đảo encoder/camera.

    # === OUTLIER REJECTION ===
    max_jump_xy: 0.30               # Reject camera flip/jump; không dùng để che frame sai
    max_jump_yaw: 0.70              # ≈40°, đủ cho motion thật nhưng loại yaw flip
